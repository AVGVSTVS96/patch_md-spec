packages:
  - apps/*
  - packages/*
  - tools/*

catalogMode: prefer

catalog:
  "@types/node": ^24
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: 4.1.9
  vite-plus: latest
  tailwindcss: ^4.3.1
  "@tailwindcss/vite": ^4.3.1
  react: ^19.2.7
  react-dom: ^19.2.7
  "@vitejs/plugin-react": ^6.0.3
  "@mdx-js/rollup": ^3.1.1
  "@mdx-js/react": ^3.1.1
  "@types/react": ^19.2.17
  "@types/react-dom": ^19.2.3
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
